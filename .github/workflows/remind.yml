name: Gary Reminders

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:

# NOTE: bot_once.py is intentionally NOT run here.
# The persistent bot (bot_persistent.py) handles all Telegram messages on the VPS.
# GitHub Actions only runs remind.py (calendar alerts) and daily_nudge.py (morning nudge).
# Running bot_once.py here would race with the VPS bot and consume messages first.

jobs:
  reminders:
    runs-on: ubuntu-latest
    timeout-minutes: 3

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Send reminders
        env:
          TELEGRAM_TOKEN:    ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID:  ${{ secrets.TELEGRAM_CHAT_ID }}
          GOOGLE_SHEET_ID:   ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON: ${{ secrets.GOOGLE_CREDS_JSON }}
        run: python remind.py
